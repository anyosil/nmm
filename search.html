<!DOCTYPE html>
<html>
<head>
  <title>Symphonia Search</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: sans-serif;
      background-color: #ffffff;
      margin: 0;
      padding: 0;
      color: #000;
    }
    header {
      text-align: center;
      font-size: 32px;
      color: #007BFF;
    }
    .subtitle {
      text-align: center;
      font-size: 12px;
      color: #333;
      margin-bottom: 10px;
    }
    .search-bar {
      text-align: center;
      margin-bottom: 15px;
    }
    .search-bar input[type="text"] {
      padding: 5px;
      width: 80%;
      max-width: 300px;
    }
    .search-bar button, .home-button {
      padding: 5px 10px;
      background-color: #007BFF;
      color: #fff;
      border: none;
      cursor: pointer;
    }
    /* Use an inline-block grid for better alignment on older browsers */
    .grid {
      padding: 10px;
      /* prevent gaps caused by white-space between inline-blocks */
      font-size: 0;
      text-align: center;
    }
    /* reset font-size for children */
    .grid .song-card { font-size: 14px; }
    .song-card {
      display: inline-block;
      vertical-align: top;
      border: 1px solid #ccc;
      border-radius: 5px;
      width: 120px; /* narrower tile for small covers */
      padding: 5px;
      text-align: center;
      margin: 5px;
      background: #fff;
    }
    .song-card img { display: block; max-width: 100%; height: auto; margin: 0 auto; }
    .song-card img {
      width: 100%;
      height: auto;
    }
    .song-title {
      font-size: 14px;
      font-weight: bold;
    }
    .song-artist {
      font-size: 12px;
      color: #666;
    }
    .play-button {
      margin-top: 5px;
      display: inline-block;
      padding: 5px;
      background-color: #007BFF;
      color: #fff;
      text-decoration: none;
      font-size: 12px;
      border: none;
      cursor: pointer;
    }
    /* no load button needed; covers load directly */
  </style>
</head>
<body>
  <header><strong>Symphonia!</strong></header>
  <div class="subtitle">Re-enabling access of internet music for symbian phones!</div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search songs...">
    <button onclick="performSearch()">Search</button>
    <button class="home-button" onclick="location.href='index.html'">Home</button>
  </div>
  <div class="grid" id="songsContainer"></div>

  <script src="script.js"></script>
  <script>
    function getQueryParam(param) {
      var query = window.location.search;
      if (!query) { return ''; }
      query = query.substring(1);
      var parts = query.split('&');
      for (var i = 0; i < parts.length; i++) {
        var pair = parts[i].split('=');
        try {
          if (decodeURIComponent(pair[0]) === param) {
            return pair.length > 1 ? decodeURIComponent(pair[1]) : '';
          }
        } catch (e) {
          // ignore malformed encoding
        }
      }
      return '';
    }

    function performSearch() {
      var query = document.getElementById('searchInput').value;
      if (query && query.replace(/^\s+|\s+$/g, '') !== '') {
        window.location.href = 'search.html?q=' + encodeURIComponent(query);
      }
    }

    function displayResults(query) {
      var container = document.getElementById('songsContainer');
      container.innerHTML = '';

      if (!window.musicDatabase || musicDatabase.length === 0) {
        container.innerHTML = '<p style="text-align:center">Loading songs...</p>';
        return;
      }

      var q = (query || '').toLowerCase();
      var results = [];
      for (var i = 0; i < musicDatabase.length; i++) {
        var song = musicDatabase[i];
        var matched = false;
        if (song.title && song.title.toLowerCase().indexOf(q) !== -1) { matched = true; }
        if (!matched && song.artist && song.artist.toLowerCase().indexOf(q) !== -1) { matched = true; }
        if (!matched && song.album && song.album.toLowerCase().indexOf(q) !== -1) { matched = true; }
        if (matched) { results.push(song); }
      }

      if (results.length === 0) {
        container.innerHTML = '<p style="text-align:center">No results found.</p>';
        return;
      }

      for (var j = 0; j < results.length; j++) {
        var s = results[j];
        var card = document.createElement('div');
        card.className = 'song-card';
  var coverSrc = s.cover || 'default-cover.png';
  var imgHtml = '<img src="' + coverSrc + '" alt="cover" width="80" height="80" onerror="this.onerror=null;this.src=\'default-cover.png\';">';
        var titleHtml = '<div class="song-title">' + (s.title || '') + '</div>';
        var artistHtml = '<div class="song-artist">' + (s.artist || '') + '</div>';
        var playHtml = '<a class="play-button" href="' + (s.url || '#') + '" target="_blank">Play</a>';
        card.innerHTML = imgHtml + titleHtml + artistHtml + playHtml;
        container.appendChild(card);
      }

      // images load directly at small size with onerror fallback
    }

    window.onload = function () {
      var query = getQueryParam('q');
      try { document.getElementById('searchInput').value = query; } catch (e) {}
      if (typeof musicDatabase !== 'undefined') {
        displayResults(query);
      } else {
        var interval = setInterval(function () {
          if (typeof musicDatabase !== 'undefined') {
            clearInterval(interval);
            displayResults(query);
          }
        }, 100);
      }
    };
  </script>
</body>
</html>
