<!DOCTYPE html>
<html>
<head>
  <title>Symphonia Mobile</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: sans-serif;
      background-color: #ffffff;
      margin: 0;
      padding: 0;
      color: #000;
    }
    header {
      text-align: center;
      font-size: 32px;
      color: #007BFF;
    }
    .subtitle {
      text-align: center;
      font-size: 12px;
      color: #333;
      margin-bottom: 10px;
    }
    .search-bar {
      text-align: center;
      margin-bottom: 15px;
    }
    .search-bar input[type="text"] {
      padding: 5px;
      width: 80%;
      max-width: 300px;
    }
    .search-bar button {
      padding: 5px 10px;
      background-color: #007BFF;
      color: #fff;
      border: none;
      cursor: pointer;
    }
    /* Use an inline-block grid for better alignment on older browsers */
    .grid {
      padding: 10px;
      /* prevent gaps caused by white-space between inline-blocks */
      font-size: 0;
      text-align: center;
    }
    /* reset font-size for children */
    .grid .song-card { font-size: 14px; }
    .song-card {
      display: inline-block;
      vertical-align: top;
      border: 1px solid #ccc;
      border-radius: 5px;
      width: 120px; /* narrower tile for small covers */
      padding: 5px;
      text-align: center;
      margin: 5px;
      background: #fff;
    }
    /* ensure images don't stretch layout */
    .song-card img { display: block; max-width: 100%; height: auto; margin: 0 auto; }
    .song-card img {
      width: 100%;
      height: auto;
    }
    .song-title {
      font-size: 14px;
      font-weight: bold;
    }
    .song-artist {
      font-size: 12px;
      color: #666;
    }
    .play-button {
      margin-top: 5px;
      display: inline-block;
      padding: 5px;
      background-color: #007BFF;
      color: #fff;
      text-decoration: none;
      font-size: 12px;
      border: none;
      cursor: pointer;
    }
    /* no load button needed; covers load directly */
    .pagination {
      text-align: center;
      margin: 10px 0;
    }
    .pagination a {
      padding: 5px 10px;
      margin: 0 2px;
      background-color: #007BFF;
      color: #fff;
      text-decoration: none;
      display: inline-block;
    }
    @media screen and (min-width: 600px) {
      .song-card {
        width: 22%;
      }
    }
  </style>
</head>
<body>
  <header><strong>Symphonia!</strong></header>
  <div class="subtitle">Re-enabling access of internet music for symbian phones!</div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search songs...">
    <button onclick="performSearch()">Search</button>
  </div>
  <div class="grid" id="songsContainer"></div>
  <div class="pagination" id="pagination"></div>

  <script src="script.js"></script>
  <script>
    var songs = [];
    var songsPerPage = 10;
    var allSongs = [];

    function getQueryParam(param) {
      var query = window.location.search;
      if (!query) { return 1; }
      query = query.substring(1); // remove '?'
      var parts = query.split('&');
      for (var i = 0; i < parts.length; i++) {
        var pair = parts[i].split('=');
        try {
          if (decodeURIComponent(pair[0]) === param) {
            var val = pair.length > 1 ? decodeURIComponent(pair[1]) : '';
            var n = parseInt(val, 10);
            return isNaN(n) ? 1 : n;
          }
        } catch (e) {
          // ignore malformed encoding
        }
      }
      return 1;
    }

    function shuffle(array) {
      for (var i = array.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = array[i];
        array[i] = array[j];
        array[j] = tmp;
      }
    }

    function displaySongs(currentPage) {
      var container = document.getElementById('songsContainer');
      container.innerHTML = '';
      var start = (currentPage - 1) * songsPerPage;
      var end = start + songsPerPage;
      var visibleSongs = songs.slice(start, end);

      for (var i = 0; i < visibleSongs.length; i++) {
        var song = visibleSongs[i];
        var card = document.createElement('div');
        card.className = 'song-card';
  var coverSrc = song.cover || 'default-cover.png';
  var imgHtml = '<img src="' + coverSrc + '" alt="cover" width="80" height="80" onerror="this.onerror=null;this.src=\'default-cover.png\';">';
        var titleHtml = '<div class="song-title">' + (song.title || '') + '</div>';
        var artistHtml = '<div class="song-artist">' + (song.artist || '') + '</div>';
        var playHtml = '<a class="play-button" href="' + (song.url || '#') + '" target="_blank">Play</a>';
        card.innerHTML = imgHtml + titleHtml + artistHtml + playHtml;
        container.appendChild(card);
      }

      updatePagination(currentPage);
    }

    function updatePagination(currentPage) {
      var pageCount = Math.ceil(songs.length / songsPerPage);
      var pagination = document.getElementById('pagination');
      pagination.innerHTML = '';
      var maxVisiblePages = 2;

      var visible = pageCount < maxVisiblePages ? pageCount : maxVisiblePages;
      for (var i = 1; i <= visible; i++) {
        var link = document.createElement('a');
        link.appendChild(document.createTextNode(i));
        link.href = 'index.html?page=' + i;
        pagination.appendChild(link);
      }

      if (pageCount > maxVisiblePages) {
        var nextLink = document.createElement('a');
        nextLink.appendChild(document.createTextNode('\u2192'));
        var nextPage = currentPage + 1;
        if (nextPage > pageCount) { nextPage = pageCount; }
        nextLink.href = 'index.html?page=' + nextPage;
        pagination.appendChild(nextLink);
      }
    }

    function performSearch() {
      var query = document.getElementById('searchInput').value;
      if (query && query.replace(/^\s+|\s+$/g, '') !== '') {
        window.location.href = 'search.html?q=' + encodeURIComponent(query);
      }
    }

    // images now load directly but are constrained to small size (120x120) with onerror fallback

    window.onload = function () {
      var currentPage = getQueryParam('page');
      if (typeof musicDatabase !== 'undefined') {
        // copy array safely for older engines
        allSongs = [];
        for (var i = 0; i < musicDatabase.length; i++) { allSongs.push(musicDatabase[i]); }
        shuffle(allSongs);
        songs = allSongs;
        displaySongs(currentPage);
      }
    };
  </script>
</body>
</html>
